<!-- CSS Flexbox
Lab Assignment
• Task: Create a simple webpage layout using Flexbox. The layout should include:
• A header.
• A sidebar on the left.
• A main content area in the center.
• A footer.
Additional Requirements:
• Use Flexbox to position and align the elements.
• Apply different justify-contentand align-itemsproperties to observe theireffects.
• Ensure the layout is responsive, adjusting for smaller screens. -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Flexbox Layout</title>
    <link rel="stylesheet" href="flexbox.css">
</head>

<body>

<header class="header">
    <h2>My Flexbox Dashboard</h2>
</header>

<div class="layout">

    <aside class="sidebar">
        <h3>Menu</h3>
        <ul>
            <li>Home</li>
            <li>Profile</li>
            <li>Settings</li>
        </ul>
    </aside>

    <main class="main">

        <h2>Main Content</h2>
        <p>This is the main content area using Flexbox layout.</p>

        <div class="cards">
            <div class="card">Card 1</div>
            <div class="card">Card 2</div>
            <div class="card">Card 3</div>
        </div>

    </main>

</div>

<footer class="footer">
    <p>© 2026 Dashboard</p>
</footer>

</body>
</html>
