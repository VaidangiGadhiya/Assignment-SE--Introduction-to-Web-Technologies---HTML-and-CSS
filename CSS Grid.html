<!-- CSS Grid
Lab Assignment
• Task: Create a 3x3 grid of product cards using CSS Grid. Each card should contain:
• A product image.
• A product title.
• A price.
Additional Requirements:
• Use grid-template-columnsto create the grid layout.
• Use grid-gapto add spacing between the grid items.
• Apply hover effects to each card for better interactivity. -->



<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Furniture Store</title>
    <link rel="stylesheet" href="grid.css">
</head>

<body>

<header class="header">
    <h1>Furniture Store</h1>
</header>

<section class="section">
    <h2 class="title">Our Products</h2>

    <div class="grid">

        <div class="card">
            <img src="https://images.pexels.com/photos/1866149/pexels-photo-1866149.jpeg?auto=compress&cs=tinysrgb&w=600">
            <h3>Luxury Sofa</h3>
            <p>₹45,000</p>
        </div>

        <div class="card">
            <img src="https://images.pexels.com/photos/2762247/pexels-photo-2762247.jpeg?auto=compress&cs=tinysrgb&w=600">
            <h3>Designer Chair</h3>
            <p>₹12,000</p>
        </div>

        <div class="card">
            <img src="https://images.pexels.com/photos/1080721/pexels-photo-1080721.jpeg?auto=compress&cs=tinysrgb&w=600">
            <h3>Dining Table</h3>
            <p>₹35,000</p>
        </div>

        <div class="card">
            <img src="https://images.pexels.com/photos/1648776/pexels-photo-1648776.jpeg?auto=compress&cs=tinysrgb&w=600">
            <h3>King Size Bed</h3>
            <p>₹50,000</p>
        </div>

        <div class="card">
            <img src="https://images.pexels.com/photos/1457842/pexels-photo-1457842.jpeg?auto=compress&cs=tinysrgb&w=600">
            <h3>Wardrobe</h3>
            <p>₹60,000</p>
        </div>

        <div class="card">
            <img src="https://images.pexels.com/photos/276528/pexels-photo-276528.jpeg?auto=compress&cs=tinysrgb&w=600">
            <h3>Office Desk</h3>
            <p>₹20,000</p>
        </div>

        <div class="card">
            <img src="https://images.pexels.com/photos/271743/pexels-photo-271743.jpeg?auto=compress&cs=tinysrgb&w=600">
            <h3>Bookshelf</h3>
            <p>₹15,000</p>
        </div>

        <div class="card">
            <img src="https://images.pexels.com/photos/1571460/pexels-photo-1571460.jpeg?auto=compress&cs=tinysrgb&w=600">
            <h3>TV Unit</h3>
            <p>₹22,000</p>
        </div>

        <div class="card">
            <img src="https://images.pexels.com/photos/276583/pexels-photo-276583.jpeg?auto=compress&cs=tinysrgb&w=600">
            <h3>Coffee Table</h3>
            <p>₹10,000</p>
        </div>

    </div>
</section>

<footer class="footer">
    <p>© 2026 Furniture Store</p>
</footer>

</body>
</html>
