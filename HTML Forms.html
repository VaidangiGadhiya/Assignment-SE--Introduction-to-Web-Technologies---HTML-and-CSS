<!-- HTML Forms

Lab Assignment
• Task: Create a contact form with the following fields:
• Full name (text input)
• Email (email input)
• Phone number (tel input)
• Subject (dropdown menu)
• Message (textarea)
• Submit button
Additional Requirements:
• Use appropriate form validation using required, minlength, maxlength, and
pattern.
• Link form labels with their corresponding inputs using the forattribute. -->



<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Contact Form</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background-color: #f5f5f5;
    }

    .container {
        max-width: 500px;
        margin: 50px auto;
        background: #ffffff;
        padding: 30px;
        border-radius: 8px;
        border: 1px solid #ddd;
    }

    h2 {
        text-align: center;
        margin-bottom: 25px;
        color: #333;
    }

    label {
        display: block;
        margin-top: 15px;
        font-weight: 600;
        color: #444;
    }

    input, select, textarea {
        width: 100%;
        padding: 10px;
        margin-top: 6px;
        border: 1px solid #ccc;
        border-radius: 5px;
        font-size: 14px;
    }

    textarea {
        resize: vertical;
    }

    input:focus, select:focus, textarea:focus {
        border-color: #007bff;
        outline: none;
    }

    button {
        margin-top: 20px;
        width: 100%;
        padding: 12px;
        background-color: #007bff;
        color: white;
        border: none;
        border-radius: 5px;
        font-size: 15px;
        cursor: pointer;
    }

    button:hover {
        background-color: #0056b3;
    }

</style>
</head>

<body>

<div class="container">
    <h2>Contact Form</h2>

    <form>

        <label for="name">Full Name</label>
        <input 
            type="text" 
            id="name" 
            name="name" 
            required 
            minlength="3" 
            maxlength="30"
            placeholder="Enter your name">

        <label for="email">Email</label>
        <input 
            type="email" 
            id="email" 
            name="email" 
            required
            placeholder="Enter your email">

        <label for="phone">Phone Number</label>
        <input 
            type="tel" 
            id="phone" 
            name="phone" 
            required 
            pattern="[0-9]{10}"
            placeholder="Enter 10-digit number">

        <label for="subject">Subject</label>
        <select id="subject" name="subject" required>
            <option value="">Select Subject</option>
            <option>General Inquiry</option>
            <option>Support</option>
            <option>Feedback</option>
        </select>

        <label for="message">Message</label>
        <textarea 
            id="message" 
            name="message" 
            rows="4" 
            required 
            minlength="10" 
            maxlength="200"
            placeholder="Write your message"></textarea>

        <button type="submit">Submit</button>

    </form>
</div>

</body>
</html>
